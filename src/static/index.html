<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNSS Satellite Dashboard</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Harita Ekranı (Arka planı tamamen kaplar) */
        #cesiumContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Şık, yarı saydam, cam efektli (Glassmorphism) Veri Paneli */
        #panel {
            position: absolute; top: 20px; left: 20px; z-index: 10; width: 350px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; color: #38bdf8; }
        
        input { background: rgba(0,0,0,0.5); border: 1px solid #38bdf8; color: white; padding: 8px; width: 60%; border-radius: 6px; }
        button { background: #0284c7; border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        button:hover { background: #38bdf8; }
        
        /* Kepler Parametreleri Tablosu */
        .data-box { margin-top: 15px; font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; }
        .sat-title { color: #facc15; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="panel">
        <h2>🛰️ Uydu İzleme Paneli</h2>
        <input type="text" id="satInput" value="G01, G02" placeholder="Örn: G01, G10">
        <button onclick="loadSatellites()">Yükle</button>
        
        <div id="info" class="data-box">
            <p>Uyduları yüklemek için ID girin.</p>
        </div>
    </div>

    <script>
        // 1. Cesium 3D Dünya / 2D Harita Motorunu Başlat
        // 'scene3DOnly: false' diyerek sağ üstteki butondan 2D ve 3D geçişine izin veriyoruz
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false,
            timeline: false,
            sceneModePicker: true // SAĞ ÜSTTEKİ 2D/3D GEÇİŞ BUTONU BURADAN GELİR
        });

        // Uzaydaki aydınlatmayı açalım (Güneş ışığı)
        viewer.scene.globe.enableLighting = true;

        async function loadSatellites() {
            const satIds = document.getElementById('satInput').value;
            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = "Veriler hesaplanıyor...";
            viewer.entities.removeAll(); // Eski çizimleri temizle

            try {
                // API'ye (FastAPI'ye) istek at
                const response = await fetch(`http://localhost:8000/api/satellites?sats=${satIds}`);
                const result = await response.json();

                infoDiv.innerHTML = ""; // Yükleniyor yazısını sil

                result.data.forEach(sat => {
                    // 2. Yörüngeyi Haritaya Çiz (Ground Track)
                    const positions = sat.track.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat, p.alt));
                    
                    viewer.entities.add({
                        name: `Yörünge ${sat.id}`,
                        polyline: {
                            positions: positions,
                            width: 3,
                            material: Cesium.Color.fromRandom({alpha: 0.8}),
                        }
                    });

                    // 3. Uydunun Anlık Konumuna Kırmızı Nokta (Model) Koy
                    if (sat.current_pos) {
                        viewer.entities.add({
                            name: sat.id,
                            position: Cesium.Cartesian3.fromDegrees(sat.current_pos.lon, sat.current_pos.lat, sat.current_pos.alt),
                            point: { pixelSize: 15, color: Cesium.Color.RED, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                            label: { text: sat.id, font: '14pt monospace', style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 2, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -10) }
                        });
                    }

                    // 4. Sol Panele Kepler Parametrelerini Yazdır
                    const k = sat.kepler;
                    if(k && Object.keys(k).length > 0) {
                        infoDiv.innerHTML += `
                            <div class="sat-title">► ${sat.id} Uydusu</div>
                            Yarı Büyük Eksen (A): ${(k['A (Yarı Büyük Eksen) [m]']/1000).toFixed(2)} km<br>
                            Dışmerkezlik (e): ${k['e (Dışmerkezlik)'].toFixed(5)}<br>
                            Eğiklik (i0): ${k['i0 (Yörünge Eğikliği)'].toFixed(4)} rad<br>
                        `;
                    }
                });
                
                // Kamerayı uydulara doğru yaklaştır
                viewer.zoomTo(viewer.entities);

            } catch (error) {
                infoDiv.innerHTML = "<span style='color:red;'>API'ye bağlanılamadı. Python sunucusu açık mı?</span>";
            }
        }
    </script>
</body>
</html>
